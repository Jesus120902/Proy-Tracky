version: '3.8'

services:
  mongodb:
    image: mongo:6.0-jammy
    container_name: tracky-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: tracky-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/tracky
      - JWT_SECRET=tracky_production_secret_key_change_me_129031023
      - API_URL=http://localhost:5000
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
        - VITE_API_BASE_URL=http://localhost:5000
    container_name: tracky-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads_data:
